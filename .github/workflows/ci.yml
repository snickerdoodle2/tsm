# This file is automatically generated from Nix configuration. Do not edit directly.

jobs:
  nix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Nix
        uses: cachix/install-nix-action@v17
        with:
          extra_nix_config: access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - name: Check flake
        run: nix flake check
      - name: Check formatting
        run: nix fmt . -- --check
      - name: Check whether workflows are up to date
        run: nix run .#check-workflows
  rust:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Nix
        uses: cachix/install-nix-action@v17
        with:
          extra_nix_config: access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - name: Setup rust cache
        uses: actions/cache@v5
        with:
          key: ${{ runner.os }}-tsm-cargo-${{ hashFiles('**/Cargo.lock') }}
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
      - name: cargo check
        run: nix develop .#ci -c cargo check
      - name: cargo fmt
        run: nix develop .#ci -c cargo fmt --check
      - name: cargo clippy
        run: nix develop .#ci -c cargo clippy
      - name: cargo test
        run: nix develop .#ci -c cargo test
name: CI
"on":
  pull_request: {}
  push:
    branches:
      - main
